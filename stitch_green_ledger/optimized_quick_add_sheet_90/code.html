        background: linear-gradient(135deg, #8eff71 0%, #2ff801 100%);

        from { transform: translateY(100%); }
        to { transform: translateY(0); }

        animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);

<span class="material-symbols-outlined" style="color: #39FF14; text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);">swap_horiz</span>

<main class="max-w-7xl mx-auto px-6 pt-8 pb-32 space-y-8 w-full">

</div>
</div>
</section>

</div>
